<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Photo</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <main class="container">
        <div class="slider">
            <div class="slides" id="slides">
                </button>
                <article class="slide" role="group" aria-roledescription="slide" aria-label="Slide 1">
                    <img src="/img/ubuntu-4k.jpg" alt="">
                    <span class="caption">Ini adalah Wallpaper Ubuntu</span>
                </article>
                <article class="slide" role="group" aria-roledescription="slide" aria-label="Slide 2">
                    <img src="/img/ubuntu-lucid-wallpaper-50e4967776637252c18bd3cf0d283e19.jpg" alt="">
                    <span class="caption">Ini adalah wallpaper</span>
                </article>
                    <article class="slide" role="group" aria-roledescription="slide" aria-label="Slide 3">
                    <img src="/img/abstract-artwork-logo-linux-wallpaper-d374163633f1709651b1b381ada0e928.jpg" alt="">
                    <span class="caption">Ini adalah wallpaper linux</span>
                </article>
                <article class="slide" role="group" aria-roledescription="slide" aria-label="Slide 4">
                    <img src="/img/mac-os-x-os-x-big-sur-hd-wallpaper-863ba887a4a08dd3896af12ae4bd7792.jpg" alt="">
                    <span class="caption">Ini adalah wallpaper macOs</span>
                </article>
            </div>
            <button class="img-button prev-btn" aria-label="Previous Slide" id="prevButton">
                <svg viewbox="0 0 24 24" aria-hidden="true" focusable="false">
                    <polyline points="15 18 9 12 16 6">
                </svg>
            <button class="img-button next-btn" aria-label="Next Slide" id="nextButton">
                <svg viewbox="0 0 24 24" aria-hidden="true" focusable="false">
                    <polyline points="9 16 15 12 9 6">
                </svg>
            </button>
        </div>
    </main>
    <script src="/src/script.js"></script>
</body>
</html>
